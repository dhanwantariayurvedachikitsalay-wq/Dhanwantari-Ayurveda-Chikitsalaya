<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Full Gallery | Dhanwantari Ayurveda Chikitsalaya</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .navbar { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .full-gallery { padding: 120px 10% 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        
        .full-gallery img, .full-gallery .video-thumbnail { 
            width: 100%; height: 250px; object-fit: cover; 
            cursor: pointer; border: 2px solid var(--gold); border-radius: 10px;
        }

        .video-wrapper { position: relative; cursor: pointer; }
        .video-wrapper i {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: white;
            font-size: 3rem; opacity: 0.8; pointer-events: none;
        }

        /* Lightbox adjustments for Iframe */
        #lightbox-video, #lightbox-iframe { 
            display: none; 
            width: 90%; 
            max-width: 800px; 
            height: 450px; 
            border: 2px solid var(--gold); 
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo-text" style="padding: 10px 8%;">Dhanwantari Ayurveda Chikitsalaya - Gallery</div>
        <a href="index.html" style="color: white; padding-right: 8%; text-decoration: none;">Back Home</a>
    </nav>

    <div class="full-gallery" id="gallery-container">
        <!-- Local videos (standard files on your server) -->
     
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="close-lightbox" onclick="closeLightbox()">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <video class="lightbox-content" id="lightbox-video" controls></video>
        <!-- Added Iframe for Google Drive Videos -->
        <iframe class="lightbox-content" id="lightbox-iframe" frameborder="0" allow="autoplay"></iframe>
    </div>

    <script>
        const SHEET_ID = '1xKDaBGQtIA55Pk4aBp2PoCWNz5Itv2QREwhK_gYwwgk';
        const API_URL = `https://opensheet.elk.sh/${SHEET_ID}/Sheet1`;

        const galleryContainer = document.getElementById('gallery-container');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxVid = document.getElementById('lightbox-video');
        const lightboxIframe = document.getElementById('lightbox-iframe');

        // Extract ID from Google Drive Link
        function getDriveId(url) {
            if (!url) return null;
            const match = url.match(/\/d\/(.+?)\/(view|edit|preview)/) || url.match(/id=(.+?)(&|$)/);
            return match ? match[1] : null;
        }

        async function fetchGallery() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                data.forEach(item => {
                    const rawUrl = item.MediaURL || item.mediaurl;
                    const type = (item.MediaType || item.mediatype || "image").toLowerCase();
                    const driveId = getDriveId(rawUrl);

                    if (driveId) {
                        if (type.includes('video')) {
                            renderDriveVideo(driveId);
                        } else {
                            renderImage(`https://lh3.googleusercontent.com/d/${driveId}`);
                        }
                    }
                });
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function renderImage(src) {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'gallery-item';
            img.onclick = () => openLightbox(src, 'img');
            galleryContainer.appendChild(img);
        }

        function renderDriveVideo(id) {
            const wrapper = document.createElement('div');
            wrapper.className = 'video-wrapper';
            
            // For the thumbnail, we use a trick to get a frame from the video
            const thumb = document.createElement('img');
            thumb.src = `https://lh3.googleusercontent.com/d/${id}`; // Sometimes works for video thumbnails
            thumb.className = 'video-thumbnail';
            thumb.onerror = () => { thumb.src = 'https://via.placeholder.com/300x250?text=Video+Loading...'; };

            const icon = document.createElement('i');
            icon.className = 'fas fa-play-circle';
            
            wrapper.onclick = () => openLightbox(id, 'drive-video');
            wrapper.appendChild(thumb);
            wrapper.appendChild(icon);
            galleryContainer.appendChild(wrapper);
        }

        function openLightbox(source, mode) {
            lightbox.style.display = 'flex';
            
            // Reset all
            lightboxImg.style.display = 'none';
            lightboxVid.style.display = 'none';
            lightboxIframe.style.display = 'none';
            lightboxIframe.src = "";

            if (mode === 'img') {
                lightboxImg.style.display = 'block';
                lightboxImg.src = source;
            } 
            else if (mode === 'local-video') {
                lightboxVid.style.display = 'block';
                lightboxVid.src = source;
                lightboxVid.play();
            } 
            else if (mode === 'drive-video') {
                lightboxIframe.style.display = 'block';
                // This is the "Embed" URL that actually works for videos
                lightboxIframe.src = `https://drive.google.com/file/d/${source}/preview`;
            }
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
            lightboxVid.pause();
            lightboxVid.src = "";
            lightboxIframe.src = "";
        }

        lightbox.onclick = (e) => { if (e.target === lightbox) closeLightbox(); };

        fetchGallery();
    </script>
</body>
</html>
